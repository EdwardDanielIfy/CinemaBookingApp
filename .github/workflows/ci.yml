name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build with Maven
        working-directory: CinemaBookingApp
        run: mvn clean install -DskipTests

      - name: Run tests
        working-directory: CinemaBookingApp
        env:
          MONGO_URI: mongodb://localhost:27017/cinemabooking
          SECRETKEY: testSecretKeyForCIOnlyNotRealKey123456
          JWT_EXPIRATION: 86400000
          JWT_REFRESH: 604800000
          PAYSTACK_SECRETKEY: dummy
          RESEND_PASSWORD: dummy
          RESEND_PORT: 465
        run: mvn test